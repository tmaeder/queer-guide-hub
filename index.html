    <!-- Sync theme before paint. Reads the same localStorage key the
         ThemeProvider uses and applies the .light/.dark class to <html>
         immediately, so the first paint matches the user's saved choice.
         Without this the page rendered as light first, then flipped to
         dark when React hydrated. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('ui-theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved = saved === 'dark' || saved === 'light'
            ? saved
            : (prefersDark ? 'dark' : 'light');
          document.documentElement.classList.remove('light', 'dark');
          document.documentElement.classList.add(resolved);
        } catch (e) { /* private mode or no localStorage — fall back to light */ }
      })();
    </script>
