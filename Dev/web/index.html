<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Queer Guide</title>
    <meta name="description" content="Connecting the LGBTQ+ community with safe spaces, events, businesses, and each other." />
    <meta name="author" content="Queer Guide" />
    
    <!-- Fonts: self-hosted (no external CDN) — see src/index.css @font-face -->

    <!-- Resource Hints: Mapbox -->
    <link rel="dns-prefetch" href="https://api.mapbox.com">
    <link rel="preconnect" href="https://api.mapbox.com" crossorigin>
    <link rel="dns-prefetch" href="https://events.mapbox.com">
    <link rel="preconnect" href="https://events.mapbox.com" crossorigin>

    <!-- PWA Manifest & Meta -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-48.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <meta name="application-name" content="Queer Guide">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- GetYourGuide widget script is loaded on-demand by ActivitiesWidget component -->

    <!-- Umami Analytics - Self-hosted -->
    <!-- <script defer src="/umami.js" data-website-id="queer-guide"></script> -->

    <meta property="og:title" content="Queer Guide" />
    <meta property="og:description" content="Connecting the LGBTQ+ community with safe spaces, events, businesses, and each other." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/images/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@queerguide" />
    <meta name="twitter:image" content="/images/og-image.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
