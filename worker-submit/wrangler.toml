name = "queer-guide-worker-submit"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Per-user rate limit + idempotency cache.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_KV_ID"

[vars]
# Comma-separated list of allowed origins. The Chrome extension's origin is
# chrome-extension://<extension-id>; add it here once published. Web app
# origins (queer.guide, www.queer.guide) are also welcome to call /submit.
ALLOWED_ORIGINS = "https://queer.guide,https://www.queer.guide"
SUBMISSION_RATE_PER_MIN = "10"

# Secrets (set via `wrangler secret put NAME`):
#   SUPABASE_URL          - https://<project>.supabase.co
#   SUPABASE_SERVICE_KEY  - service-role key (writes ingestion_staging)
#   SUPABASE_JWT_SECRET   - HS256 secret used by Supabase Auth, used to verify user JWTs

[observability]
enabled = true
