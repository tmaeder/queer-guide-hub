# Self-hosted Twenty CRM (twentyhq/twenty) — internal ops/partnerships tool.
#
# Run UNMODIFIED (AGPL-3.0): we only talk to it over its REST API, never fork it
# into the queer.guide stack.
#
# ⚠ Twenty's OFFICIAL upstream compose is the source of truth and is what the
# working local install actually runs (docs/integrations/twenty-crm-sync.md,
# go-live step 1 — fetch it via curl). This simplified copy is a reference only;
# prefer the upstream file. Current Twenty uses ENCRYPTION_KEY (not APP_SECRET)
# and postgres/postgres@db defaults.
#
# Bring up:   cp .env.example .env && edit secrets && docker compose up -d
# App:        http://localhost:3000  (put behind a reverse proxy at crm.queer.guide)
version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${PG_DATABASE_USER}
      POSTGRES_PASSWORD: ${PG_DATABASE_PASSWORD}
    volumes:
      - twenty_db:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  server:
    image: twentycrm/twenty:${IMAGE_TAG}
    depends_on: [db, redis]
    ports:
      - "3000:3000"
    environment:
      SERVER_URL: ${SERVER_URL}
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER}:${PG_DATABASE_PASSWORD}@db:5432/default
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STORAGE_TYPE: local
    volumes:
      - twenty_storage:/app/packages/twenty-server/.local-storage
    restart: unless-stopped

  worker:
    image: twentycrm/twenty:${IMAGE_TAG}
    depends_on: [db, redis, server]
    command: ["yarn", "worker:prod"]
    environment:
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER}:${PG_DATABASE_PASSWORD}@db:5432/default
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STORAGE_TYPE: local
    volumes:
      - twenty_storage:/app/packages/twenty-server/.local-storage
    restart: unless-stopped

volumes:
  twenty_db:
  twenty_storage:
