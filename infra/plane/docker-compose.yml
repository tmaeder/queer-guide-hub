# Plane self-host (Community Edition) — plane.queer.guide
#
# Adapted from https://github.com/makeplane/plane/blob/master/docker-compose.yml
# Differences from upstream:
#   - MinIO service removed; object storage delegated to Cloudflare R2 (S3-compatible).
#   - `cloudflared` sidecar handles ingress; no host ports published except proxy:80 bound to 127.0.0.1.
#   - All image tags driven by ${PLANE_VERSION} in .env (pin to a specific release).
#
# Update procedure:
#   1. Read upstream release notes: https://github.com/makeplane/plane/releases
#   2. Bump PLANE_VERSION in .env (and commit .env.example reference if needed).
#   3. ./backup/backup.sh            # take a fresh dump first
#   4. docker compose pull
#   5. docker compose up -d
#   6. Watch `docker compose logs -f api` until migrations finish.

x-app-env: &app-env
  env_file:
    - .env
  restart: unless-stopped

services:
  plane-db:
    <<: *app-env
    image: postgres:15.7-alpine
    container_name: plane-db
    command: postgres -c 'max_connections=1000'
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  plane-redis:
    <<: *app-env
    image: valkey/valkey:7.2.5-alpine
    container_name: plane-redis
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  plane-mq:
    <<: *app-env
    image: rabbitmq:3.13.6-management-alpine
    container_name: plane-mq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    <<: *app-env
    image: makeplane/plane-backend:${PLANE_VERSION}
    container_name: plane-api
    command: ./bin/docker-entrypoint-api.sh
    depends_on:
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_healthy
      plane-mq:
        condition: service_healthy

  worker:
    <<: *app-env
    image: makeplane/plane-backend:${PLANE_VERSION}
    container_name: plane-worker
    command: ./bin/docker-entrypoint-worker.sh
    depends_on:
      api:
        condition: service_started

  beat-worker:
    <<: *app-env
    image: makeplane/plane-backend:${PLANE_VERSION}
    container_name: plane-beat-worker
    command: ./bin/docker-entrypoint-beat.sh
    depends_on:
      api:
        condition: service_started

  migrator:
    <<: *app-env
    image: makeplane/plane-backend:${PLANE_VERSION}
    container_name: plane-migrator
    command: ./bin/docker-entrypoint-migrator.sh
    restart: "no"
    depends_on:
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_healthy

  web:
    <<: *app-env
    image: makeplane/plane-frontend:${PLANE_VERSION}
    container_name: plane-web
    depends_on:
      - api
      - worker

  space:
    <<: *app-env
    image: makeplane/plane-space:${PLANE_VERSION}
    container_name: plane-space
    depends_on:
      - api
      - worker
      - web

  admin:
    <<: *app-env
    image: makeplane/plane-admin:${PLANE_VERSION}
    container_name: plane-admin
    depends_on:
      - api
      - web

  live:
    <<: *app-env
    image: makeplane/plane-live:${PLANE_VERSION}
    container_name: plane-live
    depends_on:
      - api
      - web

  proxy:
    <<: *app-env
    image: makeplane/plane-proxy:${PLANE_VERSION}
    container_name: plane-proxy
    ports:
      - "127.0.0.1:${NGINX_PORT}:80"
    environment:
      NGINX_PORT: ${NGINX_PORT}
      BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-5242880}
    depends_on:
      - web
      - api
      - space

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: plane-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - proxy

volumes:
  pgdata:
  redisdata:
  rabbitmq_data:
