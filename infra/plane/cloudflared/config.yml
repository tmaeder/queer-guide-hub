# Cloudflare Tunnel config — plane.queer.guide
#
# Not required when using TUNNEL_TOKEN in docker-compose (token-based tunnels
# carry config from the Cloudflare dashboard). Kept here as a reference for
# self-managed (credentials-file) tunnels and for disaster recovery.
#
# To switch to credentials-file mode:
#   1. `cloudflared tunnel login` on the VM
#   2. `cloudflared tunnel create plane-queer-guide`
#   3. Copy ~/.cloudflared/<UUID>.json to ./cloudflared/credentials.json
#   4. Replace the `cloudflared` service command in docker-compose.yml with:
#        command: tunnel --config /etc/cloudflared/config.yml run
#      and mount ./cloudflared:/etc/cloudflared:ro

tunnel: REPLACE_TUNNEL_UUID
credentials-file: /etc/cloudflared/credentials.json

ingress:
  - hostname: plane.queer.guide
    service: http://plane-proxy:80
    originRequest:
      noTLSVerify: false
      connectTimeout: 30s
      # Plane's live collaboration uses websockets.
      disableChunkedEncoding: false
  - service: http_status:404
