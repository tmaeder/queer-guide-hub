# Privacy-hardened nginx config for queer.guide mirrors
# Used by: Tor onion container, Infomaniak mirror

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Privacy: minimal logging ---
    access_log off;
    error_log  /dev/null crit;

    # --- Hide server identity ---
    server_tokens off;

    # --- Performance ---
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length    256;
    gzip_vary          on;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        # Tor onion service internal listener
        listen 8080;

        server_name _;
        root /var/www/queer-guide;
        index index.html;

        # --- Security Headers ---
        # Strict CSP for mirrors (no external services needed)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;

        # Onion-Location header (uncomment after first Tor deploy, replace address)
        # add_header Onion-Location "http://REPLACE_WITH_ONION_ADDRESS.onion$request_uri" always;

        # --- Only allow safe methods ---
        if ($request_method !~ ^(GET|HEAD)$) {
            return 405;
        }

        # --- SPA fallback ---
        location / {
            try_files $uri $uri/ /index.html;
        }

        # --- Static assets: immutable long cache ---
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        location ~* \.(js|css|woff2?|png|jpg|jpeg|webp|avif|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # --- Prevent access to hidden files ---
        location ~ /\. {
            deny all;
            return 404;
        }

        # --- Custom error pages ---
        error_page 404 /index.html;
        error_page 500 502 503 504 /offline.html;
    }
}
