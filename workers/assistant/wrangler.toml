name = "queer-guide-assistant"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Per-conversation memory lives in a Durable Object.
[[durable_objects.bindings]]
name = "CONVERSATION"
class_name = "Conversation"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Conversation"]

[vars]
ALLOWED_ORIGINS = "https://queer.guide,https://www.queer.guide,http://localhost:3000"
AI_GATEWAY_ACCOUNT_ID = "7aa3765cc5f50f2b681b782eb4a8d296"
AI_GATEWAY_NAME = "qg-search"
# Tiered Claude (plan §6.1): Haiku routes + runs the tool loop; Sonnet for
# synthesis/escalation (escalation is a follow-up; the skeleton uses ROUTER_MODEL).
ROUTER_MODEL = "claude-haiku-4-5-20251001"
SYNTH_MODEL = "claude-sonnet-4-6"

# Secrets (set via: wrangler secret put NAME):
#   ANTHROPIC_API_KEY     - Claude key, proxied through the qg-search AI Gateway
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY  - service role, for the search_documents RPC tools

[observability]
enabled = true

[[routes]]
pattern = "assistant.queer.guide"
custom_domain = true
