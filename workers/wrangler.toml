# Cloudflare Workers — queer-guide
# Full Supabase replacement: D1 (database), R2 (storage), KV (cache)

name = "queer-guide-workers"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database (replaces Supabase PostgreSQL) ──
[[d1_databases]]
binding = "DB"
database_name = "queer-guide-db"
database_id = "${D1_DATABASE_ID}"
migrations_dir = "migrations"

# ── R2 Storage (replaces Supabase Storage) ──
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "queer-guide-storage"

# ── KV Namespaces (replaces Redis/Upstash) ──
[[kv_namespaces]]
binding = "CACHE"
id = "${CACHE_KV_ID}"

[[kv_namespaces]]
binding = "SESSIONS"
id = "${SESSIONS_KV_ID}"

[[kv_namespaces]]
binding = "REDIRECTS"
id = "${REDIRECTS_KV_ID}"

# ── Secrets (set via `wrangler secret put <NAME>`) ──
# JWT_SECRET              — signing key for auth tokens
# CLOUDFLARE_ZONE_ID
# CLOUDFLARE_ACCOUNT_ID
# CLOUDFLARE_API_TOKEN
# TURNSTILE_SITE_KEY
# TURNSTILE_SECRET_KEY
# OPENWEATHER_API_KEY
# TRAVELPAYOUTS_API_TOKEN
# PEXELS_API_KEY
# UNSPLASH_ACCESS_KEY

# ── Wasm modules (built via `npm run build:wasm`) ──
# Rust/Wasm crates in wasm/ are compiled to wasm32-unknown-unknown and
# post-processed by wasm-bindgen. The resulting .wasm + .js files in
# wasm/pkg/ are automatically bundled by Wrangler's esbuild pipeline
# when imported from TypeScript source files (no explicit config needed).

[vars]
ALLOWED_ORIGINS = "https://queer.guide,https://www.queer.guide,http://localhost:5173,http://localhost:3000"
