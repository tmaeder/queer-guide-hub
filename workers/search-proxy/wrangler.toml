name = "queer-guide-search-proxy"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "EMBED_CACHE"
id = "f54d40f6d0fa4c5680857dbb21971a02"

[[kv_namespaces]]
binding = "SESSION_CACHE"
id = "d3c4fcf5602545e28515d0a62ebea64c"

[vars]
ALLOWED_ORIGINS = "https://queer.guide,https://www.queer.guide,http://localhost:3000"
AI_GATEWAY_ACCOUNT_ID = "7aa3765cc5f50f2b681b782eb4a8d296"
AI_GATEWAY_NAME = "qg-search"
EMBED_MODEL = "@cf/baai/bge-m3"
ENABLE_RERANKER = "1"
# Search backend. Postgres (search_hybrid / search_autocomplete) is the only
# backend now; Meilisearch was fully decommissioned. Kept as a var for clarity.
SEARCH_BACKEND = "pg"

# Secrets (set via: wrangler secret put NAME):
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#   SUPABASE_JWT_SECRET  — OPTIONAL project JWT secret (HS256). When set, the
#     safety layer verifies the caller's access token offline (no network hop)
#     to decide whether to surface gated (high-risk-country) content. When
#     UNSET, the Worker falls back to a GoTrue check using SUPABASE_SERVICE_KEY,
#     so the gate works without this secret — setting it is purely a latency
#     optimization. Find it in Supabase: Project Settings → API → JWT Secret.

[observability]
enabled = true

# Custom domain — exposes the search-proxy as search.queer.guide so client
# code never references the historical workers.dev hostname.
[[routes]]
pattern = "search.queer.guide"
custom_domain = true
