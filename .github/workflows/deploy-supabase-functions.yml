name: Deploy Supabase functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:
    inputs:
      redeploy_all:
        description: "Redeploy every edge function (regardless of git diff)"
        type: boolean
        default: false

concurrency:
  group: deploy-supabase
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: xqeacpakadqfxjxjcewc
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Guard — internal pipeline/source children must declare verify_jwt=false
        run: |
          set -e
          missing=()
          # Scoped to pipeline-* only. source-* functions are mixed-use
          # (some are pipeline nodes, others are user-facing endpoints), so
          # callers must opt them in to this guard manually.
          for fn in supabase/functions/pipeline-*; do
            [ -d "$fn" ] || continue
            slug=$(basename "$fn")
            if ! awk -v slug="$slug" '
              $0 == "[functions." slug "]" {found=1; next}
              found && /^verify_jwt = false/ {ok=1; exit}
              found && /^\[/ {exit}
              END {exit !ok}
            ' supabase/config.toml; then
              missing+=("$slug")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::These pipeline-* functions lack [functions.<slug>] verify_jwt = false in config.toml:"
            printf '::error::  - %s\n' "${missing[@]}"
            echo "::error::Add an entry to supabase/config.toml or the executor's bearer call will 401."
            exit 1
          fi
          echo "All pipeline-* functions declare verify_jwt=false."

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          # Matches pipeline-health.yml — Supabase Edge Runtime has
          # moved to Deno 2.x.
          deno-version: v2.x

      - name: Run edge function tests
        # Gate the deploy on the deno test suite under
        # supabase/functions/_tests. Matches the ci.yml edge-fn-tests
        # invocation (same files, same flags) so a PR that passes CI
        # also clears the deploy gate. The other 6 tests under
        # _tests/ need per-file triage before they can be added here.
        working-directory: supabase/functions/_tests
        run: deno test --allow-net --allow-env --allow-read source-adapter.test.ts pipeline-nodes.test.ts wikinews.test.ts enrichment-driver.test.ts batch-circuit-checker.test.ts trip-inbox-fields.test.ts

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: latest

      - name: Push migrations
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: |
          if ! git diff --name-only HEAD~1 HEAD | grep -q "^supabase/migrations/"; then
            echo "No migration changes. Skipping db push."
            exit 0
          fi

          echo "Migration changes detected. Pushing to remote project..."
          supabase link --project-ref "$SUPABASE_PROJECT_REF"

          # Capture `db push` output so we can tell a drift error apart from
          # a real migration failure. Remote-only migration versions (someone
          # applied a migration without committing the file, or a branch was
          # rolled back) are surfaced as a ::warning:: so the deploy-functions
          # step can still run — the repo owner resolves the drift manually
          # with either `supabase db pull` or `supabase migration repair`.
          set +e
          # Plain `db push` (NOT --include-all). The one-time out-of-order
          # backlog that accumulated while the pipeline was drift-skipping has
          # been reconciled (remote history == repo, 0 pending), so normal
          # migrations — which always carry the newest timestamp — apply in
          # order. --include-all was deliberately reverted: it would apply
          # *out-of-order* migrations regardless of order, which is dangerous
          # when an old pending migration has since been superseded (it errors on
          # a return-type change, or silently reverts the newer definition). With
          # plain push, a future out-of-order migration ERRORS loudly here (caught
          # by the failure branch below) instead of silently corrupting state.
          push_output=$(supabase db push 2>&1)
          push_exit=$?
          set -e
          echo "$push_output"

          if [ $push_exit -eq 0 ]; then
            exit 0
          fi

          if echo "$push_output" | grep -q "Remote migration versions not found in local migrations directory"; then
            {
              echo "::warning title=Supabase migration drift::The remote project has migration versions that don't exist in this repo."
              echo "::warning::Fix locally with \`supabase db pull\` (to commit the remote schema as new migration files)"
              echo "::warning::or \`supabase migration repair --status reverted <version(s)>\` if those migrations were rolled back."
              echo "::warning::Skipping \`db push\` for this run so edge functions can still deploy — the run is FAILED at the end to flag the drift."
            }
            # Do NOT exit 0 silently here: a silent skip is exactly how drift went
            # unnoticed for days (merged migrations never applied to prod). Record
            # the drift and continue so functions still deploy; the final step
            # fails the run so the drift is loud and gets fixed the same day.
            echo "DRIFT_DETECTED=true" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::error title=Supabase db push failed::\`supabase db push\` failed for a reason other than drift. See log above."
          exit 1

      - name: Deploy changed edge functions
        if: env.SUPABASE_ACCESS_TOKEN != ''
        env:
          REDEPLOY_ALL: ${{ inputs.redeploy_all }}
        run: |
          # Manual trigger with redeploy_all=true forces a full redeploy.
          # If a shared file changed in this push, also redeploy every function
          # (each bundles shared code at deploy time).
          if [ "$REDEPLOY_ALL" = "true" ] \
             || git diff --name-only HEAD~1 HEAD | grep -q "^supabase/functions/_shared/" \
             || git diff --name-only HEAD~1 HEAD | grep -q "^supabase/config.toml$"; then
            echo "Redeploying every function (manual trigger, shared code, or config.toml changed)."
            CHANGED=$(ls -1 supabase/functions | grep -v '^_')
          else
            # Skip every underscore-prefixed dir (_shared, _tests, …) — they are
            # not deployable functions and `functions deploy _tests` hard-fails.
            CHANGED=$(git diff --name-only HEAD~1 HEAD | awk -F/ '/^supabase\/functions\// && $3 !~ /^_/ {print $3}' | sort -u)
          fi

          if [ -z "$CHANGED" ]; then
            echo "No edge function changes detected."
            exit 0
          fi

          for fn in $CHANGED; do
            if [ -d "supabase/functions/$fn" ]; then
              echo "::group::Deploying $fn"
              supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF" || {
                echo "::error::Failed to deploy $fn"
                exit 1
              }
              echo "::endgroup::"
            fi
          done

      - name: Skip notice
        if: env.SUPABASE_ACCESS_TOKEN == ''
        run: |
          echo "::warning::SUPABASE_ACCESS_TOKEN secret is not configured."
          echo "::warning::Add it under repo Settings to Secrets to enable automatic deploys."
          echo "::warning::Generate a token at https://supabase.com/dashboard/account/tokens"

      # Runs after functions have deployed, so drift never blocks an edge-function
      # deploy — but a drifted run is now a FAILED run (loud + notified) instead of
      # a green run with a buried warning. Resolve by committing the orphan SQL into
      # a file at its remote version, `supabase db pull`, or `migration repair`.
      - name: Fail the run on migration drift
        if: env.DRIFT_DETECTED == 'true'
        run: |
          echo "::error title=Supabase migration drift::db push was skipped due to remote-only migration versions, so MERGED MIGRATIONS DID NOT APPLY. Edge functions still deployed. Resolve the drift, then re-run."
          exit 1
