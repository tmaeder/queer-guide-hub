name: Sitemap Freshness
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL to audit (default = Pages deployment; the public
          queer.guide domain 403s Actions IPs via Cloudflare bot management)
        required: false
        default: https://queer-guide.pages.dev
  schedule:
    - cron: "0 5 * * *"
concurrency:
  group: sitemap-freshness
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Audit sitemap freshness
        env:
          INPUT_BASE: ${{ github.event.inputs.base_url }}
        run: node scripts/sitemap-freshness.mjs "${INPUT_BASE:-https://queer-guide.pages.dev}"
