name: Deploy Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - 'workers/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: workers

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Create KV namespaces and update wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Ensure each KV namespace exists, creating if needed
          ensure_namespace() {
            local binding="$1"
            local title="queer-guide-workers-${binding}"
            local id

            # Check if namespace already exists
            id=$(npx wrangler kv namespace list 2>/dev/null | node -e "
              let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{
                try { const ns=JSON.parse(d); const m=ns.find(n=>n.title==='${title}');
                if(m) process.stdout.write(m.id); } catch(e) {}
              })
            ") || true

            if [ -z "$id" ]; then
              echo "Creating namespace: ${title}"
              local output
              output=$(npx wrangler kv namespace create "$binding" 2>&1)
              echo "$output"
              id=$(echo "$output" | grep -oP 'id = "\K[^"]+')
            else
              echo "Found existing namespace: ${title} (${id})"
            fi

            if [ -n "$id" ]; then
              # Replace the placeholder in wrangler.toml
              sed -i "s|\${${binding}_KV_ID}|${id}|g" wrangler.toml
              echo "Updated wrangler.toml with ${binding} = ${id}"
            else
              echo "ERROR: Failed to get ID for ${binding}"
              exit 1
            fi
          }

          ensure_namespace "CACHE"
          ensure_namespace "SESSIONS"
          ensure_namespace "REDIRECTS"

          echo "--- Final KV config ---"
          grep -A1 'kv_namespaces' wrangler.toml || true

      - name: Deploy Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers
          command: deploy
          secrets: |
            CLOUDFLARE_ZONE_ID
            CLOUDFLARE_API_TOKEN
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set optional Worker secrets
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set_secret() {
            local name="$1" value="$2"
            if [ -n "$value" ]; then
              echo "$value" | npx wrangler secret put "$name" 2>/dev/null && echo "Set $name" || echo "Warning: failed to set $name"
            else
              echo "Skipping $name (not configured)"
            fi
          }
          set_secret "TURNSTILE_SITE_KEY" "${{ secrets.TURNSTILE_SITE_KEY }}"
          set_secret "TURNSTILE_SECRET_KEY" "${{ secrets.TURNSTILE_SECRET_KEY }}"
          set_secret "OPENWEATHER_API_KEY" "${{ secrets.OPENWEATHER_API_KEY }}"
          set_secret "TRAVELPAYOUTS_API_TOKEN" "${{ secrets.TRAVELPAYOUTS_API_TOKEN }}"
          set_secret "PEXELS_API_KEY" "${{ secrets.PEXELS_API_KEY }}"
          set_secret "UNSPLASH_ACCESS_KEY" "${{ secrets.UNSPLASH_ACCESS_KEY }}"
          set_secret "SUPABASE_URL" "${{ secrets.SUPABASE_URL }}"
          set_secret "SUPABASE_SERVICE_ROLE_KEY" "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
