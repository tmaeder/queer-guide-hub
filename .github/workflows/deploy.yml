name: Deploy workers

on:
  push:
    branches: [main]
    paths:
      - "workers/search-proxy/**"
      - "workers/ingest/**"
      - "workers/assistant/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy-search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: npm ci
        working-directory: workers/search-proxy
      - run: npx tsc --noEmit
        working-directory: workers/search-proxy
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/search-proxy
          command: deploy

  deploy-ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: npm ci
        working-directory: workers/ingest
      - run: npx tsc --noEmit
        working-directory: workers/ingest
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/ingest
          command: deploy

  deploy-assistant:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: npm ci
        working-directory: workers/assistant
      - run: npx tsc --noEmit
        working-directory: workers/assistant
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/assistant
          command: deploy

  smoke:
    needs: [deploy-search]
    if: always() && needs.deploy-search.result == 'success'
    runs-on: ubuntu-latest
    env:
      SEARCH_URL: ${{ vars.SEARCH_URL }}
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/smoke.sh

  # Post-deploy health check for the assistant worker. It serves a public
  # GET /health returning {"ok":true}. Mirrors the search smoke gate.
  smoke-assistant:
    needs: [deploy-assistant]
    if: always() && needs.deploy-assistant.result == 'success'
    runs-on: ubuntu-latest
    env:
      ASSISTANT_URL: ${{ vars.ASSISTANT_URL || 'https://assistant.queer.guide' }}
    steps:
      - name: Check /health
        run: |
          set -euo pipefail
          echo "GET $ASSISTANT_URL/health"
          curl -sSf --retry 5 --retry-delay 10 --retry-all-errors "$ASSISTANT_URL/health" | tee /dev/stderr | grep -q '"ok":true'
          echo "  ✓ assistant health ok"

  # Post-deploy health check for the ingest worker. The ingest worker has
  # no public custom domain, so this only runs when an INGEST_URL repo
  # variable is configured (e.g. its workers.dev URL). GET /health is public.
  smoke-ingest:
    needs: [deploy-ingest]
    if: always() && needs.deploy-ingest.result == 'success' && vars.INGEST_URL != ''
    runs-on: ubuntu-latest
    env:
      INGEST_URL: ${{ vars.INGEST_URL }}
    steps:
      - name: Check /health
        run: |
          set -euo pipefail
          echo "GET $INGEST_URL/health"
          curl -sSf --retry 5 --retry-delay 10 --retry-all-errors "$INGEST_URL/health" | tee /dev/stderr | grep -q '"ok":true'
          echo "  ✓ ingest health ok"
