name: Deploy workers

on:
  push:
    branches: [main]
    paths:
      - "workers/search-proxy/**"
      - "workers/ingest/**"
      - "workers/assistant/**"
      - "workers/submit/**"
      - "workers/image-cdn/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy-search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: npm ci
        working-directory: workers/search-proxy
      - run: npx tsc --noEmit
        working-directory: workers/search-proxy
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/search-proxy
          command: deploy

  deploy-ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: npm ci
        working-directory: workers/ingest
      - run: npx tsc --noEmit
        working-directory: workers/ingest
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/ingest
          command: deploy

  deploy-assistant:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: npm ci
        working-directory: workers/assistant
      - run: npx tsc --noEmit
        working-directory: workers/assistant
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/assistant
          command: deploy

  deploy-submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: npm ci
        working-directory: workers/submit
      - run: npx tsc --noEmit
        working-directory: workers/submit
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/submit
          command: deploy

  deploy-image-cdn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: npm ci
        working-directory: workers/image-cdn
      - run: npx tsc --noEmit
        working-directory: workers/image-cdn
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/image-cdn
          command: deploy

  smoke:
    needs: [deploy-search]
    if: always() && needs.deploy-search.result == 'success'
    runs-on: ubuntu-latest
    env:
      SEARCH_URL: ${{ vars.SEARCH_URL }}
    steps:
      - uses: actions/checkout@v7
      - run: bash scripts/smoke.sh
