name: Deploy workers

on:
  push:
    branches: [main]
    paths:
      - "workers/search-proxy/**"
      - "workers/ingest/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

jobs:
  deploy-search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci
        working-directory: workers/search-proxy
      - run: npx tsc --noEmit
        working-directory: workers/search-proxy
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/search-proxy
          command: deploy

  deploy-ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci
        working-directory: workers/ingest
      - run: npx tsc --noEmit
        working-directory: workers/ingest
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/ingest
          command: deploy

  smoke:
    needs: [deploy-search]
    if: always() && needs.deploy-search.result == 'success'
    runs-on: ubuntu-latest
    env:
      SEARCH_URL: ${{ vars.SEARCH_URL }}
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/smoke.sh
