name: Extension CI

on:
  push:
    branches: [main]
    paths:
      - "extension/**"
      - "workers/submit/**"
      - ".github/workflows/extension-ci.yml"
  pull_request:
    paths:
      - "extension/**"
      - "workers/submit/**"
      - ".github/workflows/extension-ci.yml"
  workflow_dispatch: {}

jobs:
  worker-submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm install
        working-directory: workers/submit
      - run: npx tsc --noEmit
        working-directory: workers/submit
      - run: npm test
        working-directory: workers/submit

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm install
        working-directory: extension
      - run: npx tsc --noEmit
        working-directory: extension
      - run: npm test
        working-directory: extension
      - run: npm run build
        working-directory: extension
      - uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: extension/dist
          retention-days: 14
