name: Extension CI

on:
  push:
    branches: [main]
    paths:
      - "extension/**"
      - "workers/submit/**"
      - ".github/workflows/extension-ci.yml"
  pull_request:
    paths:
      - "extension/**"
      - "workers/submit/**"
      - ".github/workflows/extension-ci.yml"
  workflow_dispatch: {}

jobs:
  worker-submit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/submit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: workers/submit/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: extension/dist
          retention-days: 14
