name: Update Visual Baselines

# Regenerates the Playwright visual-regression baselines on the SAME platform
# the nightly suite runs on (ubuntu / amd64-linux), so the committed baselines
# always match CI's exact browser build. Run this whenever the UI changes
# intentionally. With commit=true (default) the regenerated *-linux.png
# baselines are committed straight to the dispatched branch; they are also
# uploaded as an artifact either way.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to screenshot'
        required: false
        default: 'https://queer.guide'
      commit:
        description: 'Commit regenerated baselines to the dispatched branch'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  update-baselines:
    name: Regenerate linux visual baselines
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Regenerate visual baselines
        env:
          E2E_BASE_URL: ${{ inputs.base_url || 'https://queer.guide' }}
        # --update-snapshots writes the new baselines and exits non-zero when
        # any snapshot changed (Playwright 1.52+ "update but flag" behaviour),
        # so don't fail the job on that.
        run: |
          npx playwright test \
            e2e/visual-top10.spec.ts \
            e2e/visual-mobile.spec.ts \
            e2e/design-system.spec.ts \
            --update-snapshots --reporter=line || true
      - name: Upload regenerated linux baselines
        uses: actions/upload-artifact@v7
        with:
          name: linux-visual-baselines
          path: |
            e2e/**/*-linux.png
          if-no-files-found: error
          retention-days: 7
      - name: Commit baselines to dispatched branch
        if: inputs.commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add e2e/*-snapshots/*-linux.png
          if git diff --cached --quiet; then
            echo "baselines unchanged — nothing to commit"
          else
            git commit -m "test(e2e): update linux visual baselines [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
