# Surfaces ESLint findings to GitHub Code Scanning as SARIF so security /
# quality issues show up in the Security tab + PR conversation. The actual
# merge-blocking lint gate is the `lint` job in ci.yml — this workflow is
# reporting-only (`continue-on-error: true` on the scan step).
#
# Originally added by #1235 with the GitHub-suggested template, which
# hardcoded ESLint 8 + `--config .eslintrc.js` + `--ext`. This project ships
# ESLint 10 with flat-config (`eslint.config.js`), where those flags are
# invalid; ESLint errored silently and the upload step then failed every PR
# check on a missing SARIF file. Fixed by running the project's own pinned
# ESLint via `npm ci` and dropping the incompatible flags.

name: ESLint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '16 12 * * 3'

jobs:
  eslint:
    name: Run eslint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read # required by github/codeql-action/upload-sarif on private repos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # `npm ci` uses the project's pinned ESLint (flat-config). We layer
        # the SARIF formatter on top via `--no-save` — it isn't part of the
        # runtime dependency tree.
        run: |
          npm ci
          npm install --no-save @microsoft/eslint-formatter-sarif@3.1.0

      - name: Run ESLint
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        # Flat config picks up eslint.config.js automatically. `--ext` is a
        # legacy flag with no meaning under flat config; file selection comes
        # from the config itself.
        run: npx eslint . --format @microsoft/eslint-formatter-sarif --output-file eslint-results.sarif
        continue-on-error: true

      - name: Upload analysis results to GitHub
        # Guard against an ESLint crash leaving no SARIF file behind so the
        # whole job doesn't fail on a missing path.
        if: hashFiles('eslint-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true
