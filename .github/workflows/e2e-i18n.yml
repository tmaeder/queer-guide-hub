name: E2E i18n Smoke

on:
  push:
    branches: [main]
    paths:
      - 'e2e/trips-i18n.spec.ts'
      - 'src/i18n/**'
      - 'src/pages/trips/**'
      - 'playwright.config.ts'
      - '.github/workflows/e2e-i18n.yml'
  pull_request:
    paths:
      - 'e2e/trips-i18n.spec.ts'
      - 'src/i18n/**'
      - 'src/pages/trips/**'
      - 'playwright.config.ts'
      - '.github/workflows/e2e-i18n.yml'
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against'
        required: false
        default: 'https://queer.guide'

concurrency:
  group: e2e-i18n-${{ github.ref }}
  cancel-in-progress: true

jobs:
  i18n-smoke:
    name: Trip planner i18n smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BASE_URL_INPUT: ${{ inputs.base_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run i18n smoke tests
        env:
          E2E_BASE_URL: ${{ inputs.base_url || 'https://queer.guide' }}
        run: npx playwright test e2e/trips-i18n.spec.ts

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
