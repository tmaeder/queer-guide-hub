name: Probe VPS layout
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SSH_KEY: ${{ secrets.INFOMANIAK_SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}
      SSH_USER: ${{ secrets.INFOMANIAK_SSH_USER }}
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
      - name: Probe layout
        run: |
          ssh "$SSH_USER@$SSH_HOST" bash <<'REMOTE'
            echo "=== HOME ==="; echo "$HOME"
            echo "=== ls ~ ==="; ls -la ~ 2>/dev/null | head -30
            echo "=== find .env max 4 ==="; find ~ -maxdepth 4 -name '.env' 2>/dev/null | head -10
            echo "=== find compose max 5 ==="; find ~ -maxdepth 5 \( -name 'docker-compose.yml' -o -name 'docker-compose.yaml' -o -name 'compose.yml' -o -name 'compose.yaml' \) 2>/dev/null | head -10
            echo "=== find *meili* max 5 ==="; find ~ -maxdepth 5 -iname '*meili*' 2>/dev/null | head -20
            echo "=== which docker ==="; which docker 2>&1 || true
            echo "=== /etc/default ==="; ls /etc/default/ 2>/dev/null | grep -i meili 2>/dev/null || echo "no meili in /etc/default"
            echo "=== /opt /srv ==="; ls /opt 2>/dev/null; ls /srv 2>/dev/null
          REMOTE
