name: Reconfigure Meilisearch

# One-shot workflow to apply the bug-#4 / #9 / #10 ranking + stop-words +
# alias settings to the production Meilisearch instance, and to seed
# city aliases for ~30 well-known cities.
#
# Reads MEILI_MASTER_KEY from the .env on the VPS so we don't have to
# duplicate it as a GH secret.

on:
  workflow_dispatch:
    inputs:
      seed_aliases:
        description: 'Also run seed-city-aliases.sh'
        type: boolean
        default: true

concurrency:
  group: meili-reconfig
  cancel-in-progress: false

jobs:
  reconfig:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SSH_KEY: ${{ secrets.INFOMANIAK_SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}
      SSH_USER: ${{ secrets.INFOMANIAK_SSH_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Copy scripts to VPS
        run: |
          scp -o StrictHostKeyChecking=accept-new \
            meilisearch/configure-indexes.sh \
            meilisearch/seed-city-aliases.sh \
            "$SSH_USER@$SSH_HOST:/tmp/"

      - name: Discover meilisearch compose dir on VPS
        id: discover
        run: |
          DIR=$(ssh "$SSH_USER@$SSH_HOST" 'find ~ /opt /srv /var -maxdepth 6 -type f -name docker-compose.yml -path "*meilisearch*" 2>/dev/null | head -1 | xargs -I{} dirname {}')
          if [ -z "$DIR" ]; then
            echo "Could not find meilisearch dir on VPS" >&2; exit 1
          fi
          echo "compose_dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "Discovered: $DIR"

      - name: Run configure-indexes.sh
        env:
          COMPOSE_DIR: ${{ steps.discover.outputs.compose_dir }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" "COMPOSE_DIR='$COMPOSE_DIR' bash -s" <<'REMOTE'
            set -euo pipefail
            if [ ! -f "$COMPOSE_DIR/.env" ]; then
              echo "No .env in $COMPOSE_DIR" >&2; exit 1
            fi
            set -a
            . "$COMPOSE_DIR/.env"
            set +a
            export MEILI_URL="https://s.queer.guide"
            chmod +x /tmp/configure-indexes.sh
            bash /tmp/configure-indexes.sh
          REMOTE

      - name: Run seed-city-aliases.sh
        if: ${{ inputs.seed_aliases }}
        env:
          COMPOSE_DIR: ${{ steps.discover.outputs.compose_dir }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" "COMPOSE_DIR='$COMPOSE_DIR' bash -s" <<'REMOTE'
            set -euo pipefail
            set -a
            . "$COMPOSE_DIR/.env"
            set +a
            export MEILI_URL="https://s.queer.guide"
            chmod +x /tmp/seed-city-aliases.sh
            bash /tmp/seed-city-aliases.sh
            rm -f /tmp/configure-indexes.sh /tmp/seed-city-aliases.sh
          REMOTE
