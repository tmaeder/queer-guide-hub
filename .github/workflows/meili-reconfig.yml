name: Reconfigure Meilisearch

# One-shot workflow to apply the bug-#4 / #9 / #10 ranking + stop-words +
# alias settings to the production Meilisearch instance, and to seed
# city aliases for ~30 well-known cities.
#
# The deploy-only Infomaniak SSH user has no docker access, so we cannot
# read MEILI_MASTER_KEY off the VPS .env from CI. Pass it as a secret
# input on dispatch — it gets passed straight to curl and is never logged.

on:
  workflow_dispatch:
    inputs:
      seed_aliases:
        description: 'Also run seed-city-aliases.sh'
        type: boolean
        default: true

concurrency:
  group: meili-reconfig
  cancel-in-progress: false

jobs:
  reconfig:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # MEILI_MASTER_KEY must be present as a repo secret. Set with:
      #   gh secret set MEILI_MASTER_KEY
      MEILI_MASTER_KEY: ${{ secrets.MEILI_MASTER_KEY }}
      MEILI_URL: https://s.queer.guide
    steps:
      - uses: actions/checkout@v4

      - name: Verify MEILI_MASTER_KEY is set
        run: |
          if [ -z "${MEILI_MASTER_KEY:-}" ]; then
            echo "::error::MEILI_MASTER_KEY repo secret is not set. Run: gh secret set MEILI_MASTER_KEY"
            exit 1
          fi

      - name: Probe Meilisearch
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' "$MEILI_URL/health")
          echo "Meili /health → $status"
          [ "$status" = "200" ]

      - name: Run configure-indexes.sh
        run: |
          chmod +x meilisearch/configure-indexes.sh
          bash meilisearch/configure-indexes.sh

      - name: Run seed-city-aliases.sh
        if: ${{ inputs.seed_aliases }}
        run: |
          chmod +x meilisearch/seed-city-aliases.sh
          bash meilisearch/seed-city-aliases.sh
