name: Reconfigure Meilisearch

# Diagnostic round 2: understand which Caddy instance serves Meilisearch

on:
  workflow_dispatch:
    inputs:
      seed_aliases:
        description: 'Also run seed-city-aliases.sh'
        type: boolean
        default: true

concurrency:
  group: meili-reconfig
  cancel-in-progress: false

jobs:
  reconfig:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MEILI_MASTER_KEY: ${{ secrets.MEILI_MASTER_KEY }}
      SSH_KEY: ${{ secrets.INFOMANIAK_SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}
      SSH_USER: ${{ secrets.INFOMANIAK_SSH_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets
        run: |
          fail=0
          for var in MEILI_MASTER_KEY SSH_KEY SSH_HOST SSH_USER; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Secret $var is not set"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ]

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Diagnose Caddy routing
        run: |
          ssh "$SSH_USER@$SSH_HOST" bash <<'REMOTE'
            echo "=== All IPs on :443 and :80 ==="
            ss -tln | grep -E ':443|:80 '

            echo ""
            echo "=== Trying all IPs with -k --resolve on HTTPS ==="
            for ip in 127.0.0.1 127.0.0.80 10.56.63.29 84.16.72.163; do
              for host in s.queer.guide search.queer.guide; do
                resp=$(curl -sk --max-time 5 \
                  --resolve "$host:443:$ip" \
                  "https://$host/health" 2>/dev/null)
                code=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 5 \
                  --resolve "$host:443:$ip" \
                  "https://$host/health" 2>/dev/null)
                echo "  https --resolve $host:443:$ip -> $code body='$resp'"
              done
            done

            echo ""
            echo "=== Trying HTTP (port 80) with Host header ==="
            for ip in 127.0.0.1 127.0.0.80 10.56.63.29 84.16.72.163; do
              for host in s.queer.guide search.queer.guide; do
                resp=$(curl -s --max-time 5 \
                  -H "Host: $host" \
                  "http://$ip/health" 2>/dev/null)
                code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 \
                  -H "Host: $host" \
                  "http://$ip/health" 2>/dev/null)
                echo "  http://$ip Host:$host -> $code body='$resp'"
              done
            done

            echo ""
            echo "=== Try common Meilisearch paths ==="
            for ip in 127.0.0.1 127.0.0.80 10.56.63.29; do
              for host in s.queer.guide search.queer.guide; do
                # Try / and /version
                for path in / /health /version /indexes; do
                  code=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 3 \
                    --resolve "$host:443:$ip" \
                    "https://$host$path" 2>/dev/null)
                  [ "$code" != "404" ] && echo "  https --resolve $host:443:$ip $path -> $code"
                done
              done
            done

            echo ""
            echo "=== Check what serves on 127.0.0.1:443 ==="
            curl -svk --max-time 3 https://127.0.0.1/ 2>&1 | grep -E 'server:|Server:|HTTP/' || true

            echo ""
            echo "=== Check Varnish/nginx on 127.0.0.80 ==="
            curl -sv --max-time 3 http://127.0.0.80/ 2>&1 | grep -E 'server:|Server:|HTTP/|via:|Via:' || true

            echo ""
            echo "=== Try the search subdomain via Meilisearch API key ==="
            for ip in 127.0.0.1 127.0.0.80 10.56.63.29; do
              for host in s.queer.guide search.queer.guide; do
                code=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 3 \
                  --resolve "$host:443:$ip" \
                  -H "Authorization: Bearer $MEILI_MASTER_KEY" \
                  "https://$host/health" 2>/dev/null)
                [ "$code" != "404" ] && echo "  AUTH https --resolve $host:443:$ip /health -> $code"
              done
            done

            echo "=== DONE ==="
          REMOTE
