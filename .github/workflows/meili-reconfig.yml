name: Reconfigure Meilisearch

# Applies ranking, stop-words, alias settings to the production Meilisearch
# instance via SSH tunnel (Cloudflare WAF blocks GH Actions datacenter IPs).

on:
  workflow_dispatch:
    inputs:
      seed_aliases:
        description: 'Also run seed-city-aliases.sh'
        type: boolean
        default: true

concurrency:
  group: meili-reconfig
  cancel-in-progress: false

jobs:
  reconfig:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MEILI_MASTER_KEY: ${{ secrets.MEILI_MASTER_KEY }}
      SSH_KEY: ${{ secrets.INFOMANIAK_SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}
      SSH_USER: ${{ secrets.INFOMANIAK_SSH_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets
        run: |
          fail=0
          for var in MEILI_MASTER_KEY SSH_KEY SSH_HOST SSH_USER; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Secret $var is not set"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ]

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Open SSH tunnel
        run: |
          ssh -f -N -L 7700:localhost:7700 "$SSH_USER@$SSH_HOST"
          sleep 1
          status=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:7700/health)
          echo "Meili /health via tunnel → $status"
          [ "$status" = "200" ]

      - name: Run configure-indexes.sh
        env:
          MEILI_URL: http://localhost:7700
        run: |
          chmod +x meilisearch/configure-indexes.sh
          bash meilisearch/configure-indexes.sh

      - name: Run seed-city-aliases.sh
        if: ${{ inputs.seed_aliases }}
        env:
          MEILI_URL: http://localhost:7700
        run: |
          chmod +x meilisearch/seed-city-aliases.sh
          bash meilisearch/seed-city-aliases.sh
