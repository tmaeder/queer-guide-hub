name: Reconfigure Meilisearch

# Runs configure-indexes.sh on the VPS via SSH.
# Requires the SSH user to have docker group access so it can
# reach Meilisearch directly, bypassing Infomaniak's Apache front-end.

on:
  workflow_dispatch:
    inputs:
      seed_aliases:
        description: 'Also run seed-city-aliases.sh'
        type: boolean
        default: true

concurrency:
  group: meili-reconfig
  cancel-in-progress: false

jobs:
  reconfig:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MEILI_MASTER_KEY: ${{ secrets.MEILI_MASTER_KEY }}
      SSH_KEY: ${{ secrets.INFOMANIAK_SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}
      SSH_USER: ${{ secrets.INFOMANIAK_SSH_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets
        run: |
          fail=0
          for var in MEILI_MASTER_KEY SSH_KEY SSH_HOST SSH_USER; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Secret $var is not set"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ]

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Copy scripts to VPS
        run: |
          scp -o StrictHostKeyChecking=accept-new \
            meilisearch/configure-indexes.sh \
            meilisearch/seed-city-aliases.sh \
            "$SSH_USER@$SSH_HOST:/tmp/"

      - name: Discover Meilisearch URL
        id: meili
        run: |
          RESULT=$(ssh "$SSH_USER@$SSH_HOST" bash <<'REMOTE'
            # Find Meilisearch container and its internal IP
            MEILI_CONTAINER=$(docker ps --format '{{.Names}}' 2>/dev/null | grep -i meili | head -1)
            if [ -z "$MEILI_CONTAINER" ]; then
              echo "ERR: no meilisearch container found" >&2
              docker ps 2>&1 >&2 || echo "docker not available" >&2
              echo "NONE"
              exit 0
            fi
            echo "Container: $MEILI_CONTAINER" >&2

            # Get the container's IP on its Docker network
            MEILI_IP=$(docker inspect "$MEILI_CONTAINER" \
              --format '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' 2>/dev/null)

            if [ -n "$MEILI_IP" ]; then
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 3 \
                "http://$MEILI_IP:7700/health" 2>/dev/null)
              echo "  http://$MEILI_IP:7700/health -> $code" >&2
              if [ "$code" = "200" ]; then
                echo "http://$MEILI_IP:7700"
                exit 0
              fi
            fi

            # Fallback: try localhost ports
            for port in 7700 7701; do
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 3 \
                "http://localhost:$port/health" 2>/dev/null)
              echo "  http://localhost:$port/health -> $code" >&2
              if [ "$code" = "200" ]; then
                echo "http://localhost:$port"
                exit 0
              fi
            done

            echo "NONE"
          REMOTE
          )
          echo "Discovery: $RESULT"
          if [ "$RESULT" = "NONE" ]; then
            echo "::error::Could not reach Meilisearch on VPS"
            exit 1
          fi
          echo "meili_url=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Run configure-indexes.sh
        run: |
          ssh "$SSH_USER@$SSH_HOST" \
            MEILI_URL="${{ steps.meili.outputs.meili_url }}" \
            MEILI_MASTER_KEY="$MEILI_MASTER_KEY" \
            bash /tmp/configure-indexes.sh

      - name: Run seed-city-aliases.sh
        if: ${{ inputs.seed_aliases }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" \
            MEILI_URL="${{ steps.meili.outputs.meili_url }}" \
            MEILI_MASTER_KEY="$MEILI_MASTER_KEY" \
            bash /tmp/seed-city-aliases.sh
