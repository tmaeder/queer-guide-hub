name: Reconfigure Meilisearch

# Diagnostic run to understand VPS environment

on:
  workflow_dispatch:
    inputs:
      seed_aliases:
        description: 'Also run seed-city-aliases.sh'
        type: boolean
        default: true

concurrency:
  group: meili-reconfig
  cancel-in-progress: false

jobs:
  reconfig:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MEILI_MASTER_KEY: ${{ secrets.MEILI_MASTER_KEY }}
      SSH_KEY: ${{ secrets.INFOMANIAK_SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}
      SSH_USER: ${{ secrets.INFOMANIAK_SSH_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets
        run: |
          fail=0
          for var in MEILI_MASTER_KEY SSH_KEY SSH_HOST SSH_USER; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Secret $var is not set"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ]

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Diagnose VPS environment
        run: |
          ssh "$SSH_USER@$SSH_HOST" bash <<'REMOTE'
            echo "=== whoami ==="
            whoami
            id

            echo "=== curl version ==="
            curl --version 2>&1 | head -3 || echo "NO CURL"

            echo "=== test TCP with bash ==="
            for target in 127.0.0.1:443 127.0.0.1:80 127.0.0.1:7700 127.0.0.80:443 127.0.0.80:80; do
              host="${target%:*}"
              port="${target##*:}"
              timeout 3 bash -c "echo > /dev/tcp/$host/$port" 2>&1 && echo "$target -> OK" || echo "$target -> FAIL"
            done

            echo "=== curl verbose to 127.0.0.1:443 ==="
            curl -vk --max-time 3 https://127.0.0.1/health 2>&1 | head -20 || true

            echo "=== curl verbose to 127.0.0.1:80 ==="
            curl -v --max-time 3 http://127.0.0.1/health 2>&1 | head -20 || true

            echo "=== curl to 127.0.0.80:443 ==="
            curl -vk --max-time 3 https://127.0.0.80/health 2>&1 | head -20 || true

            echo "=== docker access ==="
            docker ps --format '{{.Names}} | {{.Ports}} | {{.Status}}' 2>&1 || echo "NO DOCKER ACCESS"

            echo "=== docker exec meilisearch ==="
            MEILI_CONTAINER=$(docker ps --format '{{.Names}}' 2>/dev/null | grep -i meili | head -1)
            if [ -n "$MEILI_CONTAINER" ]; then
              echo "Found: $MEILI_CONTAINER"
              docker exec "$MEILI_CONTAINER" curl -s http://localhost:7700/health 2>&1 || echo "exec curl failed"
            else
              echo "No meilisearch container found via grep"
              echo "All containers:"
              docker ps --format '{{.Names}}' 2>/dev/null || true
            fi

            echo "=== docker network inspect ==="
            for net in $(docker network ls --format '{{.Name}}' 2>/dev/null); do
              containers=$(docker network inspect "$net" --format '{{range .Containers}}{{.Name}}:{{.IPv4Address}} {{end}}' 2>/dev/null)
              [ -n "$containers" ] && echo "$net: $containers"
            done

            echo "=== Caddy config check ==="
            # Find Caddy config
            find /etc/caddy /opt -name 'Caddyfile' -o -name 'caddy.json' 2>/dev/null | head -5
            docker exec $(docker ps --format '{{.Names}}' 2>/dev/null | grep -i caddy | head -1) cat /etc/caddy/Caddyfile 2>&1 | head -30 || true

            echo "=== DONE ==="
          REMOTE
