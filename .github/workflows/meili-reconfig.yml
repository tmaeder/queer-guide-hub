name: Reconfigure Meilisearch

# Runs configure-indexes.sh on the VPS via SSH because Cloudflare WAF
# blocks direct curl from GitHub Actions datacenter IPs.

on:
  workflow_dispatch:
    inputs:
      seed_aliases:
        description: 'Also run seed-city-aliases.sh'
        type: boolean
        default: true

concurrency:
  group: meili-reconfig
  cancel-in-progress: false

jobs:
  reconfig:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MEILI_MASTER_KEY: ${{ secrets.MEILI_MASTER_KEY }}
      SSH_KEY: ${{ secrets.INFOMANIAK_SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}
      SSH_USER: ${{ secrets.INFOMANIAK_SSH_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets
        run: |
          fail=0
          for var in MEILI_MASTER_KEY SSH_KEY SSH_HOST SSH_USER; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Secret $var is not set"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ]

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Copy scripts to VPS
        run: |
          scp -o StrictHostKeyChecking=accept-new \
            meilisearch/configure-indexes.sh \
            meilisearch/seed-city-aliases.sh \
            "$SSH_USER@$SSH_HOST:/tmp/"

      - name: Discover Meilisearch URL
        id: meili
        run: |
          URL=$(ssh "$SSH_USER@$SSH_HOST" bash <<'REMOTE'
            for url in \
              "http://localhost:7700" \
              "http://127.0.0.1:7700" \
              "http://localhost:80" \
              "http://localhost:443"; do
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 3 "$url/health" 2>/dev/null || echo "000")
              echo "  $url/health → $code" >&2
              if [ "$code" = "200" ]; then
                echo "$url"
                exit 0
              fi
            done
            for host in "s.queer.guide" "search.queer.guide"; do
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 3 -H "Host: $host" "http://localhost/health" 2>/dev/null || echo "000")
              echo "  localhost with Host: $host → $code" >&2
              if [ "$code" = "200" ]; then
                echo "http://localhost"
                exit 0
              fi
            done
            echo "NONE"
          REMOTE
          )
          echo "Discovered URL: $URL"
          if [ "$URL" = "NONE" ]; then
            echo "::error::Could not find Meilisearch on VPS"
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Run configure-indexes.sh
        env:
          MEILI_URL: ${{ steps.meili.outputs.url }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" \
            MEILI_URL="$MEILI_URL" \
            MEILI_MASTER_KEY="$MEILI_MASTER_KEY" \
            bash /tmp/configure-indexes.sh

      - name: Run seed-city-aliases.sh
        if: ${{ inputs.seed_aliases }}
        env:
          MEILI_URL: ${{ steps.meili.outputs.url }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" \
            MEILI_URL="$MEILI_URL" \
            MEILI_MASTER_KEY="$MEILI_MASTER_KEY" \
            bash /tmp/seed-city-aliases.sh
