name: Reconfigure Meilisearch

# Runs configure-indexes.sh on the VPS via SSH. Cloudflare WAF blocks
# GH Actions IPs, so we SSH to the VPS and curl Caddy locally with
# --resolve for proper TLS SNI.

on:
  workflow_dispatch:
    inputs:
      seed_aliases:
        description: 'Also run seed-city-aliases.sh'
        type: boolean
        default: true

concurrency:
  group: meili-reconfig
  cancel-in-progress: false

jobs:
  reconfig:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MEILI_MASTER_KEY: ${{ secrets.MEILI_MASTER_KEY }}
      SSH_KEY: ${{ secrets.INFOMANIAK_SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}
      SSH_USER: ${{ secrets.INFOMANIAK_SSH_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets
        run: |
          fail=0
          for var in MEILI_MASTER_KEY SSH_KEY SSH_HOST SSH_USER; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Secret $var is not set"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ]

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Copy scripts to VPS
        run: |
          scp -o StrictHostKeyChecking=accept-new \
            meilisearch/configure-indexes.sh \
            meilisearch/seed-city-aliases.sh \
            "$SSH_USER@$SSH_HOST:/tmp/"

      - name: Discover Meilisearch via Caddy
        id: meili
        run: |
          RESULT=$(ssh "$SSH_USER@$SSH_HOST" bash <<'REMOTE'
            # Find Caddy's public IP listening on :443
            # ss -tln output: State Recv-Q Send-Q Local_Address:Port Peer_Address:Port
            # $4 = Local_Address:Port, e.g. "84.16.72.163:443"
            caddy_ip=$(ss -tln | awk '/:443/ && $4 !~ /^127\./ && $4 !~ /^\[/ && $4 !~ /^0\.0\.0\.0/ && $4 !~ /^\*/ {
              n = split($4, a, ":")
              if (n >= 2) { print a[1]; exit }
            }')

            if [ -z "$caddy_ip" ]; then
              echo "ERR: no public IP on :443" >&2
              ss -tln >&2
              echo "NONE"
              exit 0
            fi
            echo "Caddy IP: $caddy_ip" >&2

            for host in s.queer.guide search.queer.guide; do
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 \
                --resolve "$host:443:$caddy_ip" \
                "https://$host/health" 2>/dev/null)
              echo "  --resolve $host:443:$caddy_ip -> $code" >&2
              if [ "$code" = "200" ]; then
                echo "$host $caddy_ip"
                exit 0
              fi
            done
            echo "NONE"
          REMOTE
          )
          echo "Discovery result: $RESULT"
          if [ "$RESULT" = "NONE" ]; then
            echo "::error::Could not reach Meilisearch on VPS via Caddy"
            exit 1
          fi
          MEILI_HOST=$(echo "$RESULT" | awk '{print $1}')
          CADDY_IP=$(echo "$RESULT" | awk '{print $2}')
          echo "meili_host=$MEILI_HOST" >> "$GITHUB_OUTPUT"
          echo "caddy_ip=$CADDY_IP" >> "$GITHUB_OUTPUT"

      - name: Run configure-indexes.sh
        run: |
          ssh "$SSH_USER@$SSH_HOST" \
            MEILI_URL="https://${{ steps.meili.outputs.meili_host }}" \
            MEILI_MASTER_KEY="$MEILI_MASTER_KEY" \
            MEILI_CURL_OPTS="--resolve ${{ steps.meili.outputs.meili_host }}:443:${{ steps.meili.outputs.caddy_ip }}" \
            bash /tmp/configure-indexes.sh

      - name: Run seed-city-aliases.sh
        if: ${{ inputs.seed_aliases }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" \
            MEILI_URL="https://${{ steps.meili.outputs.meili_host }}" \
            MEILI_MASTER_KEY="$MEILI_MASTER_KEY" \
            MEILI_CURL_OPTS="--resolve ${{ steps.meili.outputs.meili_host }}:443:${{ steps.meili.outputs.caddy_ip }}" \
            bash /tmp/seed-city-aliases.sh
