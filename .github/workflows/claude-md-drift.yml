name: claude-md-drift
on:
  pull_request:
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - 'CLAUDE.md'
permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    env:
      HEAD_REF: ${{ github.head_ref }}
      HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
      BASE_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: sync CLAUDE.md repo stats
        id: sync
        run: |
          actual_fns=$(ls supabase/functions/ | grep -v '^_' | grep -v '^README' | wc -l | tr -d ' ')
          actual_mig=$(ls supabase/migrations/ | grep -c '\.sql$' | tr -d ' ')
          # Rewrite the whole stats block instead of patching the first match:
          # CLAUDE.md carries `merge=union`, so merges can duplicate the bot-written
          # stat lines. Deleting every stat line and re-inserting exactly two after
          # the heading makes this step self-healing against that corruption.
          awk -v fns="$actual_fns" -v mig="$actual_mig" '
            /^- \*\*(Edge functions|Migrations):\*\* [0-9]+$/ { next }
            /^## Repo stats$/ {
              print; print "";
              print "- **Edge functions:** " fns;
              print "- **Migrations:** " mig;
              print ""; inhdr = 1; next
            }
            inhdr && /^$/ { next }
            { inhdr = 0; print }
          ' CLAUDE.md > CLAUDE.md.tmp && mv CLAUDE.md.tmp CLAUDE.md
          if git diff --quiet CLAUDE.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "fns=$actual_fns" >> "$GITHUB_OUTPUT"
            echo "mig=$actual_mig" >> "$GITHUB_OUTPUT"
          fi
      - name: commit drift fix (same-repo PRs)
        if: steps.sync.outputs.changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          FNS: ${{ steps.sync.outputs.fns }}
          MIG: ${{ steps.sync.outputs.mig }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md
          # skip-checks trailer instead of "[skip ci]": same skip effect on this
          # push, but inert when a squash merge concatenates it mid-message
          # ("[skip ci]" anywhere in a squashed message skips ALL deploys — see
          # the CLAUDE.md gotcha; bit us on PR #1952).
          git commit -m "chore(docs): sync CLAUDE.md repo counts (fns=${FNS}, mig=${MIG})" -m "skip-checks: true"
          git push origin "HEAD:${HEAD_REF}"
      - name: fail if drift remains (forks)
        if: steps.sync.outputs.changed == 'true' && github.event.pull_request.head.repo.full_name != github.repository
        env:
          FNS: ${{ steps.sync.outputs.fns }}
          MIG: ${{ steps.sync.outputs.mig }}
        run: |
          echo "::error::CLAUDE.md repo counts are stale (fns=${FNS}, mig=${MIG}); update CLAUDE.md in your fork."
          exit 1
