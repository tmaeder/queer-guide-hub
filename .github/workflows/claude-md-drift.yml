name: claude-md-drift
# Keeps the "Repo stats" counts in CLAUDE.md in sync with the actual number of
# edge functions + migrations.
#
# Runs on push to main (post-merge), NOT on pull_request. The previous
# pull_request version pushed a `skip-checks: true` commit onto the PR branch;
# that commit became the PR head, and because its checks were skipped the
# required status checks never reported on the head SHA — so any migration-
# touching PR was permanently BLOCKED (had to be unstuck by hand three times on
# 2026-07-21). Syncing on main instead means the bot never touches a PR branch,
# so it can never block a PR. Worst case (if branch protection refuses the
# direct push) the counts drift — cosmetic — but no PR is ever blocked.
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - 'CLAUDE.md'
permissions:
  contents: write
concurrency:
  # Serialize so two quick merges don't race on the same push to main.
  group: claude-md-drift-main
  cancel-in-progress: false
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: sync CLAUDE.md repo stats
        id: sync
        run: |
          actual_fns=$(ls supabase/functions/ | grep -v '^_' | grep -v '^README' | wc -l | tr -d ' ')
          actual_mig=$(ls supabase/migrations/ | grep -c '\.sql$' | tr -d ' ')
          # Rewrite the whole stats block instead of patching the first match:
          # CLAUDE.md carries `merge=union`, so merges can duplicate the bot-written
          # stat lines. Deleting every stat line and re-inserting exactly two after
          # the heading makes this step self-healing against that corruption.
          awk -v fns="$actual_fns" -v mig="$actual_mig" '
            /^- \*\*(Edge functions|Migrations):\*\* [0-9]+$/ { next }
            /^## Repo stats$/ {
              print; print "";
              print "- **Edge functions:** " fns;
              print "- **Migrations:** " mig;
              print ""; inhdr = 1; next
            }
            inhdr && /^$/ { next }
            { inhdr = 0; print }
          ' CLAUDE.md > CLAUDE.md.tmp && mv CLAUDE.md.tmp CLAUDE.md
          if git diff --quiet CLAUDE.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "fns=$actual_fns" >> "$GITHUB_OUTPUT"
            echo "mig=$actual_mig" >> "$GITHUB_OUTPUT"
          fi
      - name: commit drift fix
        if: steps.sync.outputs.changed == 'true'
        env:
          FNS: ${{ steps.sync.outputs.fns }}
          MIG: ${{ steps.sync.outputs.mig }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md
          # This commit lands on main directly. `skip-checks: true` avoids a
          # pointless full CI/deploy rebuild for a docs-only stat bump; it is a
          # trailer (not "[skip ci]"), so it can't poison a later squash merge.
          # A CLAUDE.md-only change also can't re-trigger this workflow into a
          # loop: the stats are now in sync, so the next run sees changed=false.
          git commit -m "chore(docs): sync CLAUDE.md repo counts (fns=${FNS}, mig=${MIG})" -m "skip-checks: true"
          git push origin HEAD:main
