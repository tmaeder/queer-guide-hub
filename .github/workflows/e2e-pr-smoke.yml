name: E2E PR Smoke

# Phase 5 — fast smoke subset of Playwright suite that runs on every PR.
# Targets ~5 min budget. Full nightly run still lives in e2e-nightly.yml.

on:
  pull_request:
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'package.json'
      - 'playwright.config.ts'
      - '.github/workflows/e2e-pr-smoke.yml'

concurrency:
  group: e2e-pr-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Playwright smoke (PR build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --prefer-offline --no-audit
      - run: npx playwright install --with-deps chromium
      - name: Build app
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - name: Run smoke subset
        # Test the PR's built bundle, not stale production. Prod is covered
        # nightly via e2e-nightly.yml and post-deploy. Targeting prod here
        # produces false negatives whenever the PR adds features (or fixes
        # bugs) that haven't shipped yet — those would all fail until merge.
        env:
          E2E_BASE_URL: http://localhost:4173
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: |
          npx vite preview --port 4173 &
          sleep 5
          npx playwright test \
            auth-signup-renders.spec.ts \
            search.spec.ts \
            venues/detail-content.spec.ts \
            help-locale.spec.ts \
            hotels-filters.spec.ts \
            --project=chromium
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 7
