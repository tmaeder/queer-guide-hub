name: Sync extension zip

on:
  push:
    branches: [main]
    paths:
      - "extension/**"
      - ".github/workflows/sync-extension-zip.yml"
  workflow_dispatch: {}

# When the extension changes on main, rebuild the production .zip and open a
# bot PR that updates public/extension/queer-guide-extension.zip so the
# /extension install page download stays current.

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Build extension
        working-directory: extension
        run: |
          npm install
          npm run build

      - name: Zip dist
        run: |
          cd extension/dist
          zip -rq "$GITHUB_WORKSPACE/queer-guide-extension.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: queer-guide-extension
          path: queer-guide-extension.zip
          retention-days: 30

      - name: Open PR with refreshed zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git config --global user.name "queer-guide-bot"
          git config --global user.email "bot@queer.guide"

          short="${SOURCE_SHA:0:7}"
          branch="bot/extension-zip-sync-${short}"
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null; then
            git fetch origin "$branch"
            git checkout "$branch"
          else
            git checkout -b "$branch"
          fi
          mkdir -p public/extension
          cp "$GITHUB_WORKSPACE/queer-guide-extension.zip" public/extension/queer-guide-extension.zip
          if git diff --quiet -- public/extension/queer-guide-extension.zip; then
            echo "Zip unchanged — nothing to sync."
            exit 0
          fi
          git add public/extension/queer-guide-extension.zip
          git commit -m "chore(extension): refresh extension zip from ${short}"
          git push -u origin "$branch"
          if ! gh pr view --json number >/dev/null 2>&1; then
            gh pr create \
              --title "chore(extension): refresh extension zip" \
              --body "Auto-built from ${SOURCE_SHA}. Merge to publish the new build at https://queer.guide/extension/queer-guide-extension.zip." \
              --head "$branch" --base main
          fi
