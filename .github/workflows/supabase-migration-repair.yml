name: Supabase migration repair

# Manual utility for resolving drift in the remote migration history
# table. Run this when `supabase db push` fails with "Remote migration
# versions not found in local migrations directory" and the missing
# versions do NOT exist anywhere in the repo (i.e. they were applied
# via `supabase migration new` + `supabase db push` on a branch that
# was never committed, or were experimental/rolled-back work).
#
# For drift where the missing versions DO exist in the repo on a
# feature branch, just bring those migration files into main instead —
# no repair needed.
#
# Inputs:
#   versions - whitespace-separated list of migration version
#              timestamps (e.g. "20260420130339 20260420142559")
#   status   - "reverted" or "applied". Use "reverted" to mark the
#              remote rows as rolled back (`db push` will then ignore
#              them). Use "applied" only if the migration IS in the
#              repo and was really applied but the history row is
#              missing.
#
# Safe: runs `supabase migration repair` which only touches the
# supabase_migrations.schema_migrations table — it does not modify
# any application schema.

on:
  workflow_dispatch:
    inputs:
      versions:
        description: 'Space-separated migration version timestamps'
        required: true
        type: string
      status:
        description: 'Status to set on those versions'
        required: true
        default: 'reverted'
        type: choice
        options:
          - reverted
          - applied

concurrency:
  group: deploy-supabase
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: xqeacpakadqfxjxjcewc
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate inputs
        env:
          INPUT_VERSIONS: ${{ inputs.versions }}
          INPUT_STATUS: ${{ inputs.status }}
        run: |
          # Reject anything that isn't a space-separated list of 14-digit
          # numeric version timestamps. Hard stop on surprise input so we
          # don't shell-inject into the supabase CLI call below.
          if ! echo "$INPUT_VERSIONS" | grep -Eq '^[0-9]{14}( +[0-9]{14})*$'; then
            echo "::error title=Invalid versions input::Expected a space-separated list of 14-digit migration timestamps, got: $INPUT_VERSIONS"
            exit 1
          fi
          case "$INPUT_STATUS" in
            reverted|applied) ;;
            *) echo "::error::status must be 'reverted' or 'applied', got: $INPUT_STATUS"; exit 1 ;;
          esac

      - name: Link project
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Repair migration history
        if: env.SUPABASE_ACCESS_TOKEN != ''
        env:
          INPUT_VERSIONS: ${{ inputs.versions }}
          INPUT_STATUS: ${{ inputs.status }}
        run: |
          echo "Marking versions as '$INPUT_STATUS': $INPUT_VERSIONS"
          # Intentionally unquoted so whitespace-separated versions expand
          # into multiple CLI args. `Validate inputs` already restricted
          # the string to [0-9 ] so shell-injection isn't possible.
          # shellcheck disable=SC2086
          supabase migration repair --status "$INPUT_STATUS" $INPUT_VERSIONS

      - name: Skip notice
        if: env.SUPABASE_ACCESS_TOKEN == ''
        run: |
          echo "::error::SUPABASE_ACCESS_TOKEN is not set; cannot repair."
          exit 1
