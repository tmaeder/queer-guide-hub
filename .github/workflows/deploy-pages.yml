name: Deploy to Cloudflare Pages

# Replaces the broken CF Pages git auto-deploy webhook. Builds the Vite
# bundle on push to main and pushes it via wrangler to the `queer-guide`
# Pages project (production branch = main).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          # Unified MapShell live on /map (search-filters-map, real filters,
          # mobile sheet, pride canvas). Set to 'false' to roll back to the
          # legacy ExploreMap chrome without a code change.
          VITE_MAP_SHELL: 'true'

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pass an explicit ASCII commit message. Without it, wrangler derives
          # the message from git, and the Cloudflare Pages API rejects any
          # multibyte UTF-8 (e.g. — or →) with "Invalid commit message, it must
          # be a valid UTF-8 string [code 8000111]", failing the whole deploy.
          command: pages deploy dist --project-name=queer-guide --branch=main --commit-hash=${{ github.sha }} --commit-message="deploy ${{ github.sha }}" --commit-dirty=true
