name: Deploy to Cloudflare Pages

# Replaces the broken CF Pages git auto-deploy webhook. Builds the Vite
# bundle on push to main and pushes it via wrangler to the `queer-guide`
# Pages project (production branch = main).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=queer-guide --branch=main --commit-hash=${{ github.sha }}
