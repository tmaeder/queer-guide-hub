# GitHub Actions workflow for deploying censorship-resistant mirrors
# Runs after the primary Cloudflare Pages deploy succeeds, or manually
name: Deploy Mirrors

on:
  workflow_dispatch:
    inputs:
      deploy_infomaniak:
        description: 'Deploy to Infomaniak (Switzerland)'
        type: boolean
        default: true
      deploy_vps:
        description: 'Deploy to OrangeWebsite (Iceland)'
        type: boolean
        default: true
      deploy_ipfs:
        description: 'Deploy to IPFS'
        type: boolean
        default: true
  # Trigger after primary deploy completes
  workflow_run:
    workflows: ["Deploy to Cloudflare Pages"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-mirrors
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  build-static:
    name: Build & Pre-render
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Build SPA
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Pre-render static pages
        run: npm run prerender

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-static
          path: dist-static/
          retention-days: 7

  deploy-infomaniak:
    name: Deploy to Infomaniak (Switzerland)
    needs: build-static
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.deploy_infomaniak ||
      github.event_name == 'workflow_run'
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-static
          path: dist-static/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${INFOMANIAK_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${INFOMANIAK_HOST}" >> ~/.ssh/known_hosts
        env:
          INFOMANIAK_SSH_KEY: ${{ secrets.INFOMANIAK_SSH_PRIVATE_KEY }}
          INFOMANIAK_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}

      - name: Rsync to Infomaniak
        run: |
          rsync -avz --delete \
            dist-static/ \
            "${INFOMANIAK_USER}@${INFOMANIAK_HOST}:${INFOMANIAK_WEB_ROOT}/"
        env:
          INFOMANIAK_USER: ${{ secrets.INFOMANIAK_SSH_USER }}
          INFOMANIAK_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}
          INFOMANIAK_WEB_ROOT: ${{ secrets.INFOMANIAK_WEB_ROOT }}

  deploy-vps:
    name: Deploy to OrangeWebsite (Iceland)
    needs: build-static
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.deploy_vps ||
      github.event_name == 'workflow_run'
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-static
          path: dist-static/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${VPS_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}

      - name: Rsync to VPS
        run: |
          rsync -avz --delete \
            dist-static/ \
            "${VPS_USER}@${VPS_HOST}:/var/www/queer-guide/"
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}

      - name: Reload nginx
        run: ssh "${VPS_USER}@${VPS_HOST}" "sudo nginx -s reload"
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}

  deploy-ipfs:
    name: Deploy to IPFS
    needs: build-static
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.deploy_ipfs ||
      github.event_name == 'workflow_run'
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-static
          path: dist-static/

      - name: Install IPFS
        run: |
          wget -q https://dist.ipfs.tech/kubo/v0.28.0/kubo_v0.28.0_linux-amd64.tar.gz
          tar xzf kubo_v0.28.0_linux-amd64.tar.gz
          sudo mv kubo/ipfs /usr/local/bin/
          ipfs init --profile=server

      - name: Add to IPFS and update DNSLink
        run: |
          CID=$(ipfs add -r --cid-version=1 --quieter dist-static/)
          echo "CID: $CID"
          EXISTING=$(curl -s "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=TXT&name=_dnslink.queer.guide" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")
          RECORD_ID=$(echo "$EXISTING" | jq -r '.result[0].id // empty')
          if [ -n "$RECORD_ID" ]; then
            curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"type\":\"TXT\",\"name\":\"_dnslink\",\"content\":\"dnslink=/ipfs/$CID\",\"ttl\":300}"
          else
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"type\":\"TXT\",\"name\":\"_dnslink\",\"content\":\"dnslink=/ipfs/$CID\",\"ttl\":300}"
          fi
          echo "Gateway: https://ipfs.io/ipfs/$CID/"
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
