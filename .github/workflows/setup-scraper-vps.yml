name: Setup scraper env on VPS (one-time)

on:
  workflow_dispatch:

jobs:
  setup:
    name: Write scraper .env to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${SSH_HOST}" >> ~/.ssh/known_hosts
        env:
          SSH_KEY: ${{ secrets.INFOMANIAK_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}

      - name: Write .env to VPS
        env:
          SSH_USER: ${{ secrets.INFOMANIAK_SSH_USER }}
          SSH_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SCRAPER_USER_AGENT: ${{ secrets.SCRAPER_USER_AGENT }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          ssh "${SSH_USER}@${SSH_HOST}" "cat > /opt/scraper/.env << 'ENVEOF'
          DATABASE_URL=${DATABASE_URL}
          SUPABASE_DB_URL=${SUPABASE_DB_URL}
          PUBLISH_TO_STAGING=1
          SCRAPER_USER_AGENT=${SCRAPER_USER_AGENT}
          SENTRY_DSN=${SENTRY_DSN}
          POLITE_MODE=true
          MAX_CONCURRENCY=2
          SNAPSHOT_RETENTION=3
          LOG_LEVEL=info
          DISABLE_SOURCE_MISTERBANDB=true
          NODE_ENV=production
          ENVEOF
          chmod 600 /opt/scraper/.env"

      - name: Verify
        env:
          SSH_USER: ${{ secrets.INFOMANIAK_SSH_USER }}
          SSH_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}
        run: |
          ssh "${SSH_USER}@${SSH_HOST}" "wc -l /opt/scraper/.env && echo 'env file written successfully'"
