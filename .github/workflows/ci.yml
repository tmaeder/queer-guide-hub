name: CI

# Per-PR correctness gate. Independent jobs run in parallel:
# typecheck, lint, frontend unit tests, scraper tests, worker tests,
# and edge-function deno tests. Each is a hard fail on the PR check.
# Bundle-shape and a11y gates live in their own workflows
# (bundle-shape.yml, a11y.yml) with narrower path filters; this one
# runs on every PR so anything that breaks tsc/eslint/tests is caught
# before review.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --prefer-offline --no-audit
      - run: npm run typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --prefer-offline --no-audit
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --prefer-offline --no-audit
      # Coverage gate is enforced via thresholds in vite.config.ts
      # test.coverage.thresholds (Phase 6, locked 2026-05-16).
      # VITE_MAP_SHELL matches the production build (deploy-pages.yml)
      # so tests exercise the MapShell path, not the legacy fallback.
      - run: npm run test:coverage
        env:
          VITE_MAP_SHELL: 'true'
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage/coverage-summary.json
            coverage/lcov.info
          if-no-files-found: warn
          retention-days: 14

  # Scraper unit tests (vitest in scraper/). Cheap to run; bugs here
  # affect daily data ingestion, so we always run on every PR rather
  # than gating on a path filter. Uses `npm install` to match the
  # established extension-ci.yml pattern for sub-package installs.
  scraper-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm install
        working-directory: scraper
      - run: npm test
        working-directory: scraper

  # Worker tests for every workers/* that declares a `test` script.
  # workers/submit is also covered by extension-ci.yml (path-filtered);
  # running it here covers PRs that don't touch the extension paths.
  # Workers without a test script are skipped (auto-picks up new
  # workers as they bootstrap vitest setup).
  worker-tests:
    runs-on: ubuntu-latest
    # Each worker's package.json is installed standalone from its own dir, so it
    # does NOT inherit the repo-root .npmrc (npm reads only $PWD/.npmrc, never a
    # parent's). That root file sets legacy-peer-deps=true to tolerate wrangler's
    # peerOptional @cloudflare/workers-types being a major behind the standalone
    # workers-types the workers depend on. Mirror it here as an env so every
    # per-worker `npm install` applies the same policy (else ERESOLVE).
    env:
      NPM_CONFIG_LEGACY_PEER_DEPS: "true"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Run tests for each worker with a test script
        # `npm install` (not `npm ci`) to match the established
        # extension-ci.yml pattern for sub-package installs.
        run: |
          set -e
          any_run=0
          for pkg in workers/*/package.json; do
            dir=$(dirname "$pkg")
            if node -e "const p=require('./$pkg'); process.exit(p.scripts && p.scripts.test ? 0 : 1)"; then
              echo "::group::$dir"
              (cd "$dir" && npm install && npm test)
              echo "::endgroup::"
              any_run=1
            else
              echo "Skipping $dir (no test script)"
            fi
          done
          if [ "$any_run" -eq 0 ]; then
            echo "::error::No workers/* had a test script — check this job is still doing useful work."
            exit 1
          fi

  # Migration-version guard (pure-local, no DB). Fails a PR that introduces a
  # duplicate 14-digit migration version or a malformed filename — the class of
  # breakage that silently kills `supabase db push` (see PR #1553 and
  # scripts/check-migration-versions.mjs). Pre-existing duplicates are
  # grandfathered as warnings.
  migration-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Resolve migration base ref
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            git fetch --depth=1 origin "${{ github.base_ref }}"
            echo "MIGRATION_BASE_REF=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
          else
            echo "MIGRATION_BASE_REF=HEAD~1" >> "$GITHUB_ENV"
          fi
      - run: node scripts/check-migration-versions.mjs

  # Deno tests for supabase/functions. Mirrors pipeline-health.yml's
  # known-working invocation exactly: same Deno version, same test
  # files, same flags. The other 6 test files under _tests/ need
  # per-file triage in a follow-up — they fail fast in CI (probably
  # transitive import or env-var issues) and the goal of this PR is
  # to get the existing CI-tested suites running on every PR.
  edge-fn-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run deno unit tests
        working-directory: supabase/functions/_tests
        run: deno test --allow-net --allow-env --allow-read source-adapter.test.ts pipeline-nodes.test.ts wikinews.test.ts enrichment-driver.test.ts batch-circuit-checker.test.ts trip-inbox-fields.test.ts
