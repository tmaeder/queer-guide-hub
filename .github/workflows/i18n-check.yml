name: i18n Translation Completeness

on:
  # Runs on every PR so the "Verify locales have all en.json keys"
  # required status check is always reported. Path filtering used to
  # skip the workflow entirely for non-i18n PRs, which left them
  # permanently BLOCKED on the missing required check.
  pull_request:
  push:
    branches: [main]
    paths:
      - 'src/i18n/**'
      - 'scripts/sync-translations.ts'

concurrency:
  group: i18n-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-keys:
    name: Verify locales have all en.json keys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compare locales against en.json
        run: npm run i18n:check
