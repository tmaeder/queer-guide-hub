# Dependabot scans every directory listed here on the schedule below.
# Group all npm bumps so we don't get N separate PRs per CVE — one weekly
# PR per directory, security-grouped patches still open immediately.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm:
        patterns: ['*']
        update-types: [minor, patch]
    ignore:
      # zxcvbn-ts 4.x is a breaking major: PasswordStrengthMeter uses the v3
      # API (zxcvbnOptions.setOptions + plain dictionary exports); under 4.x
      # every password scores "Very weak" (meter shipped broken once — the
      # 2026-07-02 bump reverted in PR #1913). Majors here require a
      # deliberate migration of src/components/auth/PasswordStrengthMeter.tsx.
      - dependency-name: '@zxcvbn-ts/core'
        update-types: ['version-update:semver-major']
      - dependency-name: '@zxcvbn-ts/language-common'
        update-types: ['version-update:semver-major']
      - dependency-name: '@zxcvbn-ts/language-en'
        update-types: ['version-update:semver-major']
      # typescript 7.x is incompatible with typescript-eslint (peer <6.1.0):
      # the bump makes eslint crash with ERR_INTERNAL_ASSERTION and npm
      # install fail with ERESOLVE. Recurred via #2117/#2136/#2140/#2189/
      # #2190 (root), #2176 (scraper), #2082 (extension). Majors here need a
      # deliberate toolchain migration.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  - package-ecosystem: npm
    directory: /scraper
    schedule:
      interval: weekly
    groups:
      npm:
        patterns: ['*']
        update-types: [minor, patch]
    ignore:
      # See root ignore: typescript majors break typescript-eslint.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  - package-ecosystem: npm
    directory: /extension
    schedule:
      interval: weekly
    groups:
      npm:
        patterns: ['*']
        update-types: [minor, patch]
    ignore:
      # See root ignore: typescript majors break the shared toolchain, and a
      # solo typescript-major PR union-merging against the weekly group PR
      # corrupted extension/package.json once (#2079 + #2082).
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  - package-ecosystem: npm
    directory: /workers/image-cdn
    schedule: { interval: weekly }
    groups: { npm: { patterns: ['*'], update-types: [minor, patch] } }

  - package-ecosystem: npm
    directory: /workers/image-ingest
    schedule: { interval: weekly }
    groups: { npm: { patterns: ['*'], update-types: [minor, patch] } }

  - package-ecosystem: npm
    directory: /workers/ingest
    schedule: { interval: weekly }
    groups: { npm: { patterns: ['*'], update-types: [minor, patch] } }

  - package-ecosystem: npm
    directory: /workers/search-proxy
    schedule: { interval: weekly }
    groups: { npm: { patterns: ['*'], update-types: [minor, patch] } }

  - package-ecosystem: npm
    directory: /workers/snapshot-archiver
    schedule: { interval: weekly }
    groups: { npm: { patterns: ['*'], update-types: [minor, patch] } }

  - package-ecosystem: npm
    directory: /workers/submit
    schedule: { interval: weekly }
    groups: { npm: { patterns: ['*'], update-types: [minor, patch] } }

  - package-ecosystem: npm
    directory: /workers/trip-inbox
    schedule: { interval: weekly }
    groups: { npm: { patterns: ['*'], update-types: [minor, patch] } }

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
