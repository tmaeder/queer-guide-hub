name = "queer-guide-snapshot-archiver"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat_v2"]

# Weekly archive sweep at 04:00 UTC Sunday. Tuned so it doesn't overlap with
# the daily scraper full-refresh (03:15 UTC) or the hourly events run.
# Note: CF Workers cron requires named day-of-week (SUN) rather than numeric 0.
[triggers]
crons = ["0 4 * * SUN"]

[vars]
SUPABASE_URL = "https://xqeacpakadqfxjxjcewc.supabase.co"
BATCH_LIMIT = "500"

[[r2_buckets]]
binding = "SNAPSHOT_BUCKET"
bucket_name = "queer-guide-scraper-snapshots"

# Set these via `wrangler secret put`:
# wrangler secret put SUPABASE_SERVICE_ROLE_KEY
# wrangler secret put ADMIN_SECRET  # optional, gates manual POST /
