name = "queer-guide-search-ingest"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "EMBED_CACHE"
id = "f54d40f6d0fa4c5680857dbb21971a02"

[[kv_namespaces]]
binding = "INGEST_STATE"
id = "a54963b21b5a497aa0ef76e08fc8923c"

[vars]
MEILISEARCH_URL = "https://s.queer.guide"
AI_GATEWAY_NAME = "qg-search"
EMBED_MODEL = "@cf/baai/bge-m3"

# Secrets (set via wrangler secret put NAME):
#   MEILISEARCH_ADMIN_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#   INGEST_TOKEN   (random 32+ bytes; used by Supabase webhook and backfill caller)

[triggers]
crons = ["*/15 * * * *"]

[observability]
enabled = true
